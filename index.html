<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G6（ジーシックス） - GLAY Copy Band</title>

<style>
  body {
    background: url("images/top/background.jpeg") no-repeat center center fixed;
    background-size: cover;
    color: #fff;
    font-family: "Noto Sans JP", sans-serif;
    margin: 0;
    padding: 0;
  }

  .header {
    text-align: center;
    padding: 20px 0;
  }

  .header img {
    width: 100%;
    max-width: 1200px;
    height: auto;
  }

  /* ▼ PC用：中央ブロックの外側に寄せる */
  .main-layout {
    position: relative;
    width: 90%;
    max-width: 1200px;
    margin: 0 auto;
  }

  .content-wrapper {
    width: 900px;
    margin: 0 auto;
  }

  .side-members {
    width: 260px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: absolute;
  }

  #leftMembers {
    left: calc(50% - 900px / 2 - 260px - 40px);
  }

  #rightMembers {
    right: calc(50% - 900px / 2 - 260px - 40px);
  }

  .side-members img {
    width: 100%;
    border-radius: 10px;
    box-shadow: 0 0 12px rgba(255,255,255,0.4);
  }

  .live-block {
    background: rgba(0,0,0,0.45);
    padding: 20px;
    border-radius: 10px;
    margin: 40px 0;
  }

  .summary-block {
    background: rgba(0,0,0,0.75);
  }

  .live-item {
    border-left: 5px solid #ff3b3b;
    padding-left: 10px;
    margin-bottom: 30px;
  }

  .year-title {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .live-img {
    width: 100%;
    margin-top: 10px;
    border-radius: 6px;
  }

  /* ▼ 概要ブロックの文字色（白フチ） */
  .link-mail {
    color: #4da3ff;
    font-weight: 600;
    font-size: 20px;
    text-decoration: underline;
    text-shadow:
      1px 1px 0 #fff,
      -1px 1px 0 #fff,
      1px -1px 0 #fff,
      -1px -1px 0 #fff;
  }

  .link-youtube {
    color: #ff0000;
    font-weight: 600;
    font-size: 20px;
    text-decoration: underline;
    text-shadow:
      1px 1px 0 #fff,
      -1px 1px 0 #fff,
      1px -1px 0 #fff,
      -1px -1px 0 #fff;
  }

  .link-past {
    color: #4caf50;
    font-weight: 600;
    font-size: 20px;
    text-decoration: underline;
    text-shadow:
      1px 1px 0 #fff,
      -1px 1px 0 #fff,
      1px -1px 0 #fff,
      -1px -1px 0 #fff;
  }

  /* ▼ PCではスマホ用ブロックを非表示 */
  .mobile-members {
    display: none;
  }

  /* ▼ スマホ専用レイアウト（横並び6人）＋中央ブロック余白調整 */
  @media (max-width: 768px) {

    #leftMembers,
    #rightMembers {
      display: none;
    }

    .mobile-members {
      display: flex;
      width: 90%;
      max-width: 900px;
      margin: 0 auto;
      overflow-x: auto;
      gap: 12px;
      padding: 10px 0;
    }

    .mobile-members img {
      width: 30%;
      min-width: 120px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255,255,255,0.4);
    }

    /* ▼ スマホで中央ブロックの上余白を詰める（重要） */
    .live-block {
      margin-top: 20px;
    }
  }
</style>
</head>

<body>

<div class="header">
  <img src="images/top/title.png" alt="G6タイトルロゴ">
</div>

<!-- ▼ スマホ専用：6人横並び -->
<div class="mobile-members">
  <img src="images/top/kazuya.jpg">
  <img src="images/top/yamashita.jpg">
  <img src="images/top/sekiguchi.jpg">
  <img src="images/top/akimoto.jpg">
  <img src="images/top/nishioka.jpg">
  <img src="images/top/tsuji.jpg">
</div>

<div class="main-layout">

  <!-- 左側 -->
  <div class="side-members" id="leftMembers">
    <img src="images/top/sekiguchi.jpg">
    <img src="images/top/yamashita.jpg">
    <img src="images/top/kazuya.jpg">
  </div>

  <!-- 中央 -->
  <div class="content-wrapper">
    <div class="live-block">
      <div class="live-item">
        <div class="year-title">2026年</div>
        <p>● 第4回 小岩ロックフェスティバル（2026.12.06）</p>
        <img src="images/2026/2026.12.06.jpg" class="live-img">
      </div>
    </div>

    <div class="live-block">
      <div class="live-item">
        <div class="year-title">2027年</div>
        <p>● 2027.3月　G6主催コピバンイベント開催予定<br>@小岩オルフェウス<br>----出演バンド募集中----</p>
      </div>
    </div>

    <div class="live-block summary-block">
      <div class="live-item">
        <p>お問い合わせ：
          <a href="mailto:g6.glaycopyband@gmail.com" class="link-mail">
            g6.glaycopyband@gmail.com
          </a>
        </p>
        <p>YouTube：
          <a href="https://www.youtube.com/@takuya4957" target="_blank" class="link-youtube">
            G6 Official Channel
          </a>
        </p>
        <p>
          <a href="live-history.html" class="link-past">
            ▶ ライブヒストリーはこちら
          </a>
        </p>
      </div>
    </div>
  </div>

  <!-- 右側 -->
  <div class="side-members" id="rightMembers">
    <img src="images/top/nishioka.jpg">
    <img src="images/top/tsuji.jpg">
    <img src="images/top/akimoto.jpg">
  </div>

</div>

<script>
  window.onload = function() {
    const firstBlock = document.querySelector(".live-block");
    const topPos = firstBlock.offsetTop;
    document.getElementById("leftMembers").style.top = topPos + "px";
    document.getElementById("rightMembers").style.top = topPos + "px";
  };
</script>

</body>
</html>
